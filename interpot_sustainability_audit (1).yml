title: Interpot Sustainability Audit
description: This is a sustainability audit of the activation collection and prediction
  processes in the InterProt mechanistic interpretability notebook (Adams et al.,
  2025), which is a project that applies sparse autoencoders (SAE) to the ESM-2 protein
  language model (650M parameters) to extract interpretable biological features from
  protein sequences. It then uses those features in a linear probe to predict subcellular
  localization (identifying the specific part in a cell where a protein resides).
  The main energy hotspot identified was the repeated single-sequence forward passes
  through ESM-2 and the SAE during activation harvesting approximately10,461 protein
  sequences (after length filtering). The energy consumption of this process, as well
  as its succeeding prediction process, was calculated using the CodeCarbon library.
keywords:
- sustainability audit
- mechanistic interpretability
- sparse autoencoders
- SAE
- ESM-2
- protein language model
- biological interpretability
- artificial intelligence
